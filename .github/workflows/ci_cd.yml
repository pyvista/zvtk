name: Unit Testing and Deployment

on:
  pull_request:
  workflow_dispatch:
  push:
    tags:
      - "*"
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ALLOW_PLOTTING: true
  SHELLOPTS: "errexit:pipefail"

jobs:
  doc:
    name: Build Documentation
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install uv
        run: pip install uv

      - name: Install pytest-pyvista with test dependencies
        run: uv pip install --system .[docs]

      - name: Setup headless display
        uses: pyvista/setup-headless-display-action@v4.2

      - name: Build Documentation
        run: |
          make -C doc html
          touch doc/_build/html/.nojekyll

      - name: Deploy on release
        # if: startsWith(github.ref, 'refs/tags/v')
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: doc/_build/html/

  unit_testing:
    name: Unit Testing
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.13"]
        vtk-version: ["9.4.0", "latest"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install uv
        run: pip install uv

      - name: Set up vtk
        if: ${{ matrix.vtk-version != 'latest' }}
        run: uv pip install --system vtk==${{ matrix.vtk-version }} --system

      - name: Install with test dependencies
        run: uv pip install --system .[tests] --system

      - name: Unit Testing
        run: pytest -vv

      - name: Build and verify wheels
        run: |
          uv pip install --system build twine
          python -m build
          python -m twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: pyminiply-sdist
          path: dist/*

  # Publish to PyPI using trusted publishing
  release:
    name: Release
    # if: github.event_name == 'push' && contains(github.ref, 'refs/tags')
    needs: [doc, unit_testing]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/zvtk
    permissions:
      id-token: write # this permission is mandatory for trusted publishing
    steps:
      - uses: actions/download-artifact@v5

      - name: Flatten directory structure
        run: |
          mkdir -p dist/
          find . -name '*.whl' -exec mv {} dist/ \;
          find . -name '*.tar.gz' -exec mv {} dist/ \;

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.3.3
        with:
          generate_release_notes: true
          files: |
            ./**/*.whl
